name: Update Cart Manager Agent

on:
  push:
    branches:
      - main
    paths:
      - 'src/app/agents/cartManagerAgent_initializer.py'
      - 'src/prompts/CartManagerPrompt.txt'
      - '.github/workflows/update-cart-manager-agent.yml'

jobs:
  update-agent:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Create .env file from secret
        run: printf '%s' "$ENV_CONTENT" > src/.env
        env:
          ENV_CONTENT: ${{ secrets.ENV }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/requirements.txt

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Run Cart Manager Agent Initializer
        working-directory: src/app/agents
        run: python cartManagerAgent_initializer.py

      - name: Remove .env file
        if: always()
        run: rm -f src/.env
